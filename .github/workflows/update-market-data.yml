name: Update market data

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download asset data
        run: python -m scripts.update_assets

      - name: Build index scores
        run: python -m scripts.build_index_scores

      - name: Commit updated processed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/universe.csv data/processed/index_scores.csv data/processed/indicators/*.csv
          git diff --cached --quiet || git commit -m "Update market data"
          git push
